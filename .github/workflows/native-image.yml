name: Native Image

on:
  push:
    branches:
      - master
permissions:
  contents: write

jobs:
  build-native:
    name: 'Build Native Image ${{ matrix.platform }}'
    strategy:
      matrix:
        os: [ macos-latest, windows-latest, ubuntu-latest ]
        include:
          - os: 'ubuntu-latest'
            platform: 'linux-amd64'
          - os: 'macos-latest'
            platform: 'darwin-amd64'
          - os: 'windows-latest'
            platform: 'win-amd64'
    runs-on: ${{matrix.os}}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          distribution: 'liberica'
          java-version: '22'
      - run: ./gradlew plantuml-gplv2:nativeCompile
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plantuml-native-${{ matrix.platform }}
          path: plantuml-gplv2/build/native/nativeCompile
  release-native:
    needs: build-native
    name: Release binaries
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: plantuml
          pattern: plantuml-native-*
          merge-multiple: true
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: plantuml
          name: latest
          make_latest: true
          tag_name: latest


